function fmtDate(d){return d?new Date(d).toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"}):"—";}

function fmtHrs(h){if(!h||h<=0)return"0h 00m";var hh=Math.floor(h),mm=Math.round((h-hh)*60);return hh+"h "+String(mm).padStart(2,"0")+"m";}
function fmtCur(n){return"$"+Number(n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");}

function finishSession(){var s=window._lunchSession,e=window._lunchEnd,r=window._lunchRaw,l=window._lunchMins||0;if(!s||!e)return;var dur=Math.max(0,r-(l/60));var r3=settings.rates;var tot;if(s.hireType==="Day Rate (Dry + Operator)"){tot=Math.round(((s.machine==="Hino 700"?(r3.truckDayRate||600):(r3.excavatorDayRate||250))+((r3.operatorRate||60)*dur))*100)/100;}else if(s.hireType==="Day Rate (Machine Only)"){tot=Math.round((s.machine==="Hino 700"?(r3.truckDayRate||600):(r3.excavatorDayRate||250))*100)/100;}else{tot=Math.round(dur*s.rate*100)/100;}sessions.unshift(Object.assign({},s,{endTime:e,duration:dur,total:tot,lunchBreak:l,rawDuration:r,status:"complete"}));sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});activeSession=null;saveAll();updateBanner();closeModal();toast("Session saved — "+fmtHrs(dur)+" · "+fmtCur(tot));render();}
function saveManualSession(){var client=document.getElementById("mf-client").value.trim();var date=document.getElementById("mf-date").value;var startT=document.getElementById("mf-start").value;var endT=document.getElementById("mf-end").value;if(!client){toast("Please enter a client name","error");return;}if(!date||!startT||!endT){toast("Please enter date and times","error");return;}var startISO=localISO(date,startT);var endISO=localISO(date,endT);if(new Date(endISO)<=new Date(startISO)){toast("End time must be after start","error");return;}var rawDuration=(new Date(endISO)-new Date(startISO))/3600000;var lunchMins=parseInt(gv("mf-lunch"))||0;var duration=Math.max(0,rawDuration-(lunchMins/60));var machine=document.getElementById("mf-machine").value;var attachment=gv("mf-attachment")||"General Bucket";var hireType=document.getElementById("mf-hiretype").value;var operator=document.getElementById("mf-operator").value;var site=document.getElementById("mf-site").value.trim();var notes=document.getElementById("mf-notes").value.trim();var rate=parseFloat(document.getElementById("mf-rate").value)||settings.rates.excavatorWet;var r=settings.rates;var total;if(hireType==="Day Rate (Dry + Operator)"){total=Math.round(((machine==="Hino 700"?(r.truckDayRate||600):(r.excavatorDayRate||250))+((r.operatorRate||60)*duration))*100)/100;}else if(hireType==="Day Rate (Machine Only)"){total=Math.round(rate*100)/100;}else{total=Math.round(duration*rate*100)/100;}addHistory("clients",client);addHistory("sites",site);sessions.unshift({id:uid(),client:client,machine:machine,attachment:attachment,hireType:hireType,operator:operator,site:site,notes:notes,rate:rate,startTime:startISO,endTime:endISO,duration:duration,lunchBreak:lunchMins,rawDuration:rawDuration,total:total,status:"complete",invoiced:false});sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});saveAll();closeModal();toast("Session saved — "+fmtHrs(duration));render();}

function editSession(id){var s=sessions.find(function(x){return x.id===id;});if(!s||s.invoiced)return;window._editId=id;var overlay=document.getElementById("overlay");overlay.classList.add("open");document.getElementById("modal-title").textContent="Edit Session";var crewOpts='<option value="">— Select operator —</option>'+crew.map(function(cr){return'<option value="'+esc(cr.name)+'"'+(s.operator===cr.name?" selected":"")+">"+esc(cr.name)+"</option>";}).join("");var attachOpts=ATTACHMENTS.map(function(a){return'<option value="'+a+'"'+(s.attachment===a?" selected":"")+">"+a+"</option>";}).join("");var machineOpts=MACHINES.map(function(m){return'<option value="'+m+'"'+(s.machine===m?" selected":"")+">"+m+"</option>";}).join("");var hireOpts=HIRE_TYPES.map(function(h){return'<option value="'+h+'"'+(s.hireType===h?" selected":"")+">"+h+"</option>";}).join("");function lDatePart(iso){if(!iso)return"";var m=iso.match(/^(\d{4}-\d{2}-\d{2})/);return m?m[1]:"";}function lTimePart(iso){if(!iso)return"";var m=iso.match(/T(\d{2}:\d{2})/);return m?m[1]:"";}document.getElementById("modal-body").innerHTML='<div class="field"><label>Client</label>'+smartInput("ed-client","clients","Client name",s.client)+'</div><div class="field"><label>Site</label>'+smartInput("ed-site","sites","Site name",s.site)+'</div><div class="field"><label>Date</label><input id="ed-date" type="date" value="'+lDatePart(s.startTime)+'" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div class="field-row"><div class="field"><label>Start</label><input id="ed-start" type="time" value="'+lTimePart(s.startTime)+'" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div class="field"><label>End</label><input id="ed-end" type="time" value="'+lTimePart(s.endTime)+'" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/> v><div class="field-row"><div class="field"><label>Hire Type</label><select onchange="shiftHireChange('+i+',this.value)" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:9px 12px;width:100%">'+hireOpts+'</select></div><div class="field"><label>Operator</label><select id="shift-op-'+i+'" onchange="window._shiftRows['+i+'].operator=this.value" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:9px 12px;width:100%">'+opOpts+'</select></div></div><div class="field-row"><div class="field"><label>Start *</label><input id="shift-start-'+i+'" type="time" value="'+(row.startTime||"")+'" onchange="window._shiftRows['+i+'].startTime=this.value;ssUpdateRowPreview('+i+')" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:9px 12px;width:100%"/></div><div class="field"><label>End *</label><input id="shift-end-'+i+'" type="time" value="'+(row.endTime||"")+'" onchange="window._shiftRows['+i+'].endTime=this.value;ssUpdateRowPreview('+i+')" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:9px 12px;width:100%"/></div></div><div class="field"><label>Rate ($/hr)</label><input id="shift-rate-'+i+'" type="number" value="'+row.rate+'" onchange="window._shiftRows['+i+'].rate=parseFloat(this.value)||0;ssUpdateRowPreview('+i+')" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:9px 12px;width:100%"/></div><div style="margin-bottom:8px"><div style="font-size:10px;color:#6E6B64;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Lunch Break</div><div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px">'+lbBtns+'</div></div><div id="shift-preview-'+i+'" style="background:#0D0D0D;border-radius:6px;padding:8px 10px;font-size:12px;color:#6E6B64;min-height:24px"></div></div>';});document.getElementById("modal-body").innerHTML='<div class="field"><label>Client *</label>'+smartInput("ss-client","clients","e.g. South Coast Sand & Civil")+'</div><div class="field"><label>Site</label>'+smartInput("ss-site","sites","e.g. Goolwa North Stage 1")+'</div><div class="field"><label>Date *</label><input id="ss-date" type="date" value="'+today+'" onchange="ssDateChanged()" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div style="font-size:10px;color:#6E6B64;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px;margin-top:4px">Resources on this Shift</div><div id="shift-rows-container">'+rowsHtml+'</div><button onclick="addShiftRow()" style="width:100%;padding:10px;background:#111;border:1px dashed #333;border-radius:8px;color:#6E6B64;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:14px">+ Add Another Machine / Operator</button><div class="field"><label>Notes</label>'+smartInput("ss-notes","notes","Notes about this shift")+'</div><div style="display:flex;gap:10px"><button class="btn btn-primary" style="flex:1" onclick="saveShiftSheet()">Save Shift</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>';}
function shiftMachChange(i,machine){window._shiftRows[i].machine=machine;window._shiftRows[i].rate=lookupRate(machine,window._shiftRows[i].hireType,window._shiftRows[i].attachment);var re=document.getElementById("shift-rate-"+i);if(re)re.value=window._shiftRows[i].rate;}

function shiftHireChange(i,hireType){window._shiftRows[i].hireType=hireType;window._shiftRows[i].rate=lookupRate(window._shiftRows[i].machine,hireType,window._shiftRows[i].attachment);var re=document.getElementById("shift-rate-"+i);if(re)re.value=window._shiftRows[i].rate;}
function addShiftRow(){saveShiftFields();var firstRow=window._shiftRows[0]||{};window._shiftRows.push({machine:"Hitachi ZX55U",attachment:"General Bucket",hireType:"Wet Hire",operator:"",rate:lookupRate("Hitachi ZX55U","Wet Hire","General Bucket"),startTime:firstRow.startTime||"",endTime:firstRow.endTime||"",lunch:0});renderShiftModal();restoreShiftFields();}

function saveShiftSheet(){var client=document.getElementById("ss-client").value.trim();var site=document.getElementById("ss-site").value.trim();var date=document.getElementById("ss-date").value;var notes=document.getElementById("ss-notes").value.trim();if(!client){toast("Please enter a client name","error");return;}if(!date){toast("Please enter a date","error");return;}for(var i=0;i<window._shiftRows.length;i++){var row=window._shiftRows[i];var st=(document.getElementById("shift-start-"+i)||{}).value||row.startTime||"";var et=(document.getElementById("shift-end-"+i)||{}).value||row.endTime||"";if(!st||!et){toast("Please enter times for Resource "+(i+1),"error");return;}var sISO=new Date(date+"T"+st),eISO=new Date(date+"T"+et);if(eISO<=sISO){toast("End must be after start for Resource "+(i+1),"error");return;}}addHistory("clients",client);addHistory("sites",site);var newSessions=window._shiftRows.map(function(row,i){var rate=parseFloat((document.getElementById("shift-rate-"+i)||{}).value)||row.rate||0;var operator=(document.getElementById("shift-op-"+i)||{}).value||row.operator||"";var st=(document.getElementById("shift-start-"+i)||{}).value||row.startTime||"";var et=(document.getElementById("shift-end-"+i)||{}).value||row.endTime||"";var lunch=row.lunch||0;var startISO=new Date(date+"T"+st).toISOString();var endISO=new Date(date+"T"+et).toISOString();var rawDuration=(new Date(endISO)-new Date(startISO))/3600000;var duration=Math.max(0,rawDuration-(lunch/60));var total=Math.round(duration*rate*100)/100;return{id:uid(),client:client,site:site,machine:row.machine,attachment:row.machine==="Hino 700"?"":row.attachment,hireType:row.hireType,operator:operator,rate:rate,notes:notes,startTime:startISO,endTime:endISO,duration:duration,lunchBreak:lunch,rawDuration:rawDuration,total:total,status:"complete",invoiced:false};});sessions.unshift.apply(sessions,newSessions);sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});saveAll();closeModal();toast("Shift saved — "+newSessions.length+" resource"+(newSessions.length>1?"s":""));render();}
function toggleSelectSession(id){var s=sessions.find(function(x){return x.id===id;});if(s&&s.invoiced)return;if(selectedSess.includes(id))selectedSess=selectedSess.filter(function(x){return x!==id;});else selectedSess.push(id);render();}
function addCrew(){var name=document.getElementById("cf-name").value.trim();if(!name){toast("Please enter a name","error");return;}if(crew.some(function(c){return c.name.toLowerCase()===name.toLowerCase();})){toast("Already exists","error");return;}var role=document.getElementById("cf-role").value.trim()||"Operator";var rate=parseFloat(document.getElementById("cf-rate").value)||35;crew.push({id:uid(),name:name,role:role,rate:rate});saveAll();closeModal();toast("Crew member added");render();}

function saveNewQuote(){var client=gvt("qf-client");if(!client){toast("Please enter a client name","error");return;}var site=gvt("qf-site");var notes=gvt("qf-notes");var validDays=parseInt(gv("qf-valid"))||30;var items=[];document.querySelectorAll(".q-line-row").forEach(function(row){var desc=row.querySelector(".q-desc").value.trim();var qty=parseFloat(row.querySelector(".q-qty").value)||1;var rate=parseFloat(row.querySelector(".q-rate").value)||0;var unit=row.querySelector(".q-unit").value||"hr";if(desc&&rate>0)items.push({desc:desc,qty:qty,rate:rate,unit:unit,total:Math.round(qty*rate*100)/100});});if(!items.length){toast("Please add at least one line item with a rate","error");return;}var subtotal=items.reduce(function(a,i){return a+i.total;},0);var gst=Math.round(subtotal*0.1*100)/100;var total=Math.round((subtotal+gst)*100)/100;var qNo=fmtQuoteNo(settings.nextQuote||1);var today=new Date();var expiry=new Date(today.getTime()+validDays*86400000);quotes.unshift({id:uid(),quoteNo:qNo,date:today.toISOString(),expiryDate:expiry.toISOString(),client:client,site:site,notes:notes,items:items,subtotal:subtotal,gst:gst,total:total,status:"Draft"});settings.nextQuote=(settings.nextQuote||1)+1;saveAll();closeModal();switchTab("quotes");toast("Quote "+qNo+" created");}

function doCrewSaveManual(){var client=gv("cme-client")||"";var site=gv("cme-site")||"";var date=gv("cme-date")||"";var startT=gv("cme-start")||"";var endT=gv("cme-end")||"";if(!date||!startT||!endT){toast("Please enter date, start and end time","error");return;}var engHours=gv("cme-eng-hours");if(!engHours){toast("Please enter engine hours","error");return;}var sISO=localISO(date,startT);var eISO=localISO(date,endT);if(new Date(eISO)<=new Date(sISO)){toast("End must be after start","error");return;}var raw=(new Date(eISO)-new Date(sISO))/3600000;var lunch=parseInt(gv("cme-lunch-val"))||0;var dur=Math.max(0,raw-(lunch/60));var machine=gv("cme-machine")||"Hitachi ZX55U";var attach=machine!=="Hino 700"?(gv("cme-attach")||"General Bucket"):"";var notes=gv("cme-notes")||"";addHistory("clients",client.trim());addHistory("sites",site.trim());if(engHours){var mhd=getMachineHours();mhd.unshift({id:uid(),machine:machine,type:"Hours Logged",date:date,hours:parseFloat(engHours),notes:"Manual entry",loggedBy:crewWHO?crewWHO.name:"",timestamp:new Date().toISOString()});saveMachineHours(mhd);}sessions.unshift({id:uid(),client:client.trim(),site:site.trim(),machine:machine,attachment:attach,hireType:"Wet Hire",operator:crewWHO.name,notes:notes.trim(),rate:0,startTime:sISO,endTime:eISO,duration:dur,rawDuration:raw,lunchBreak:lunch,total:0,status:"complete",invoiced:false,fromCrew:true,engineHours:engHours?parseFloat(engHours):null});sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});save("ae_sessions",sessions);crewNav(1);toast("Entry saved - "+fmtHrs(dur));}
function crewDoShareAll(){var myE=sessions.filter(function(s){return s.operator===crewWHO.name;});if(!myE.length){toast("No entries to share","error");return;}var tot=0;myE.forEach(function(e){tot+=e.duration||0;});var lines=["ANGEL EARTHWORKS & CIVIL","Timesheet - "+crewWHO.name,new Date().toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"}),"--------------------",""];myE.forEach(function(e,i){lines.push((i+1)+". "+fmtDate(e.startTime)+" "+fmtTime(e.startTime)+" to "+fmtTime(e.endTime));lines.push("   "+(e.machine||"")+(e.client?" | "+e.client:""));lines.push("   Hours: "+fmtHrs(e.duration)+(e.lunchBreak>0?" (excl. "+e.lunchBreak+"min lunch)":""));if(e.engineHours)lines.push("   Engine: "+e.engineHours+"hrs");lines.push("");});lines.push("--------------------","TOTAL: "+fmtHrs(tot));var text=lines.join("\n");if(navigator.share){navigator.share({title:"Timesheet - "+crewWHO.name,text:text}).catch(function(){});}else if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){toast("Copied to clipboard");});}}

function getMachineHours(){return load("ae_mhours",[]);}
function saveMachineHours(data){save("ae_mhours",data);}

document.getElementById("pin-screen").style.display="flex";
document.getElementById("boss-view").style.display="none";
document.getElementById("crew-view").style.display="none";

sessions=load("ae_sessions",[]);
sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});
crew=load("ae_crew",[]);
invoices=load("ae_invoices",[]);
quotes=load("ae_quotes",[]);
crewMembers=load("ae_pins",[{id:"w1",name:"Crew Member",pin:"1234",role:"Operator"}]);
var savedSettings=load("ae_settings",{});
settings=Object.assign({},DS,savedSettings);
if(!settings.rates)settings.rates=Object.assign({},DR);
if(!settings.managerPin)settings.managerPin=load("ae_mgr","0000");
});
}catch(e){console.log("Sync error:",e);}
</script>
