function compressImage(file,maxDim,quality){return new Promise(function(resolve,reject){var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var canvas=document.createElement("canvas");var w=img.width,h=img.height;if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}else{w=Math.round(w*maxDim/h);h=maxDim;}}canvas.width=w;canvas.height=h;var ctx=canvas.getContext("2d");ctx.drawImage(img,0,0,w,h);try{resolve(canvas.toDataURL("image/jpeg",quality));}catch(err){reject(err);}};img.onerror=function(){reject(new Error("Could not load image"));};img.src=e.target.result;};reader.onerror=function(){reject(new Error("Could not read file"));};reader.readAsDataURL(file);});}
function handlePhotoUpload(event,parentType,parentId){var file=event.target.files&&event.target.files[0];event.target.value="";if(!file)return;if(!file.type.match(/^image\//)){toast("Please pick an image file","error");return;}toast("Processing photo...");compressImage(file,1200,0.8).then(function(dataUrl){var photos=getPhotos(parentType,parentId);var sizeKb=Math.round(dataUrl.length/1024);if(sizeKb>900){toast("Photo too large after compression ("+sizeKb+"KB) — try a smaller one","error");return;}var totalKb=photos.reduce(function(a,p){return a+Math.round((p.data||"").length/1024);},0)+sizeKb;if(totalKb>900){toast("Adding this photo would exceed storage limit. Delete some first.","error");return;}photos.push({id:uid(),data:dataUrl,caption:"",addedAt:new Date().toISOString(),sizeKb:sizeKb});savePhotos(parentType,parentId,photos);toast("Photo added ("+sizeKb+"KB)");refreshPhotoSection(parentType,parentId);}).catch(function(err){toast("Could not process photo: "+(err.message||"unknown error"),"error");});}

function viewPhotoFull(parentType,parentId,photoId){var photos=getPhotos(parentType,parentId);var p=photos.find(function(x){return x.id===photoId;});if(!p)return;document.getElementById("pv-img").src=p.data;var cap=document.getElementById("pv-caption");if(p.caption){cap.textContent=p.caption;cap.style.display="block";}else{cap.style.display="none";}document.getElementById("photo-viewer").classList.add("open");}

function refreshPhotoSection(parentType,parentId){var existing=document.getElementById("photo-section-"+parentType+"-"+parentId);if(!existing)return;existing.outerHTML=renderPhotoSection(parentType,parentId,parentType==="invoice"?"Documents & Photos":"Photos");}

function syncFromFirebase(cb){if(typeof db==="undefined"){if(cb)cb();return;}var keys=["ae_sessions","ae_crew","ae_invoices","ae_quotes","ae_payruns","ae_compliance","ae_settings","ae_site_locations","ae_pins","ae_active","ae_clocked"];var done=0;keys.forEach(function(k){db.collection("ae_data").doc(k).get().then(function(doc){if(doc.exists){try{localStorage.setItem(k,JSON.stringify(JSON.parse(doc.data().d)));}catch(e){}}done++;if(done===keys.length&&cb)cb();}).catch(function(){done++;if(done===keys.length&&cb)cb();});});}

function fmtDate(d){return d?new Date(d).toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"}):"—";}

function autoUpdateStatuses(){var today=new Date();var changed=false;invoices.forEach(function(inv){if(inv.status==="Sent"&&inv.dueDate&&new Date(inv.dueDate)<today){inv.status="Overdue";changed=true;}});quotes.forEach(function(q){if((q.status==="Draft"||q.status==="Sent")&&q.expiryDate&&new Date(q.expiryDate)<today){q.status="Expired";changed=true;}});if(changed)saveAll();}
function lookupRate(machine,hireType,attachment,regional){var r=settings.rates;if(hireType==="Own Work")return 0;if(hireType==="Day Rate (Machine Only)"||hireType==="Day Rate (Dry + Operator)")return machine==="Hino 700"?(r.truckDayRate||600):(r.excavatorDayRate||250);if(machine==="Hino 700")return hireType==="Dry Hire"?r.truckDry:(regional?r.truckWetRegional:r.truckWet);if(hireType==="Dry Hire")return r.excavatorDry;var att=attachment||"General Bucket";if(att==="Rock Breaker")return r.excavatorWetRock;if(att==="Auger")return r.excavatorWetAuger;if(att==="Tilt Bucket")return r.excavatorWetTilt;if(att==="Trenching Bucket")return r.excavatorWetTrenching;if(att==="Clean-up Bucket")return r.excavatorWetCleanup;return r.excavatorWet;}

function smartInput(id,type,placeholder,value){value=value||"";var opts=(history[type]||[]).map(function(v){return'<div class="smart-opt" onclick="pickSmart(\''+id+'\',\''+esc(v)+'\')"><span>'+esc(v)+'</span><button class="smart-del" onclick="event.stopPropagation();delSmart(\''+id+'\',\''+type+'\',\''+esc(v)+'\')">x</button></div>';}).join("");return'<div class="smart-wrap"><input id="'+id+'" value="'+esc(value)+'" placeholder="'+esc(placeholder)+'" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%" autocomplete="off" oninput="filterSmart(\''+id+'\',\''+type+'\',this.value)" onfocus="openSmartDrop(\''+id+'\')" onblur="setTimeout(function(){closeSmartDrop(\''+id+'\')},200)"/><div class="smart-drop" id="'+id+'-drop">'+opts+'</div></div>';}

function saveShiftSheet(){var client=document.getElementById("ss-client").value.trim();var site=document.getElementById("ss-site").value.trim();var date=document.getElementById("ss-date").value;var notes=document.getElementById("ss-notes").value.trim();var regional=gv("ss-region")==="Regional";var loc=readLocationFromForm("ss");if(!client){toast("Please enter a client name","error");return;}if(!date){toast("Please enter a date","error");return;}for(var i=0;i<window._shiftRows.length;i++){var row=window._shiftRows[i];var st=(document.getElementById("shift-start-"+i)||{}).value||row.startTime||"";var et=(document.getElementById("shift-end-"+i)||{}).value||row.endTime||"";if(!st||!et){toast("Please enter times for Resource "+(i+1),"error");return;}var sISO=new Date(date+"T"+st),eISO=new Date(date+"T"+et);if(eISO<=sISO){toast("End must be after start for Resource "+(i+1),"error");return;}}addHistory("clients",client);addHistory("sites",site);addHistory("notes",notes);if(loc&&site)saveSiteLocation(site,loc.lat,loc.lng,loc.region);var newSessions=window._shiftRows.map(function(row,i){var rate=parseFloat((document.getElementById("shift-rate-"+i)||{}).value)||row.rate||0;var operator=(document.getElementById("shift-op-"+i)||{}).value||row.operator||"";var st=(document.getElementById("shift-start-"+i)||{}).value||row.startTime||"";var et=(document.getElementById("shift-end-"+i)||{}).value||row.endTime||"";var lunch=row.lunch||0;var startISO=localISO(date,st);var endISO=localISO(date,et);var rawDuration=(new Date(endISO)-new Date(startISO))/3600000;var duration=Math.max(0,rawDuration-(lunch/60));var r3=settings.rates;var total;if(row.hireType==="Day Rate (Dry + Operator)"){total=Math.round(((row.machine==="Hino 700"?(r3.truckDayRate||600):(r3.excavatorDayRate||250))+((r3.operatorRate||60)*duration))*100)/100;}else if(row.hireType==="Day Rate (Machine Only)"){total=Math.round((row.machine==="Hino 700"?(r3.truckDayRate||600):(r3.excavatorDayRate||250))*100)/100;}else if(row.hireType==="Own Work"){total=0;}else{total=Math.round(duration*rate*100)/100;}var sess={id:uid(),client:client,site:site,machine:row.machine,attachment:row.machine==="Hino 700"?"":row.attachment,hireType:row.hireType,operator:operator,rate:rate,regional:regional,notes:notes,startTime:startISO,endTime:endISO,duration:duration,lunchBreak:lunch,rawDuration:rawDuration,total:total,status:"complete",invoiced:false};if(loc){sess.gpsLat=loc.lat;sess.gpsLng=loc.lng;sess.gpsRegion=loc.region;sess.gpsDistanceKm=loc.distanceFromVH;}return sess;});sessions.unshift.apply(sessions,newSessions);sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});saveAll();closeModal();toast("Shift saved — "+newSessions.length+" resource"+(newSessions.length>1?"s":""));render();}
function toggleSelectSession(id){var s=sessions.find(function(x){return x.id===id;});if(s&&s.invoiced)return;if(selectedSess.includes(id))selectedSess=selectedSess.filter(function(x){return x!==id;});else selectedSess.push(id);render();}

function addCrew(){var name=document.getElementById("cf-name").value.trim();if(!name){toast("Please enter a name","error");return;}if(crew.some(function(c){return c.name.toLowerCase()===name.toLowerCase();})){toast("Already exists","error");return;}var role=document.getElementById("cf-role").value.trim()||"Operator";var rate=parseFloat(document.getElementById("cf-rate").value)||35;var dayRate=parseFloat(gv("cf-day-rate"))||0;var payFreq=gv("cf-pay-freq")||"fortnightly";var superFund=gvt("cf-super-fund");var superMember=gvt("cf-super-member");var pin=document.getElementById("cf-pin").value.trim();if(pin){if(pin.length!==4||isNaN(Number(pin))){toast("PIN must be 4 digits","error");return;}if((settings.managerPin||"0000")===pin){toast("Cannot use the manager PIN","error");return;}if(crewMembers.find(function(m){return m.pin===pin;})){toast("PIN already in use","error");return;}}var newId=uid();crew.push({id:newId,name:name,role:role,rate:rate,dayRate:dayRate,payFrequency:payFreq,superFund:superFund,superMember:superMember});if(pin)crewMembers.push({id:newId,name:name,role:role,pin:pin});save("ae_pins",crewMembers);saveAll();closeModal();toast("Crew member added"+(pin?" with PIN":""));render();}
function deleteCrew(id){if(!confirm("Remove this crew member?"))return;var c=crew.find(function(x){return x.id===id;});crew=crew.filter(function(x){return x.id!==id;});if(c)crewMembers=crewMembers.filter(function(m){return m.name!==c.name;});save("ae_pins",crewMembers);saveAll();render();toast("Crew member removed");}
function openEditCrew(id){var m=crew.find(function(x){return x.id===id;});if(!m)return;window._editCrewId=id;var overlay=document.getElementById("overlay");overlay.classList.add("open");document.getElementById("modal-title").textContent="Edit "+m.name;var freq=m.payFrequency||"fortnightly";var freqOpts='<option value="weekly"'+(freq==="weekly"?" selected":"")+'>Weekly</option><option value="fortnightly"'+(freq==="fortnightly"?" selected":"")+'>Fortnightly</option><option value="monthly"'+(freq==="monthly"?" selected":"")+'>Monthly</option>';document.getElementById("modal-body").innerHTML='<div class="field"><label>Full Name *</label><input id="ec-name" value="'+esc(m.name)+'"/></div><div class="field"><label>Role</label><input id="ec-role" value="'+esc(m.role||"Operator")+'"/></div><div class="field-row"><div class="field"><label>Hourly Rate ($)</label><input id="ec-rate" type="number" min="0" value="'+(m.rate||35)+'"/></div><div class="field"><label>Day Rate ($)</label><input id="ec-day-rate" type="number" min="0" value="'+(m.dayRate||0)+'"/></div></div><div class="field"><label>Pay Frequency</label><select id="ec-pay-freq" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%">'+freqOpts+'</select></div>'+divider("Super Fund Details")+'<div class="field"><label>Super Fund Name</label><input id="ec-super-fund" value="'+esc(m.superFund||"")+'" placeholder="e.g. AustralianSuper, Cbus, REST"/></div><div class="field"><label>Member Number</label><input id="ec-super-member" value="'+esc(m.superMember||"")+'" placeholder="Member ID at the fund"/></div><div style="display:flex;gap:10px"><button class="btn btn-primary" style="flex:1" onclick="saveEditCrew()">Save</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>';}
function saveEditCrew(){var id=window._editCrewId;if(!id)return;var name=gvt("ec-name");if(!name){toast("Please enter a name","error");return;}var role=gvt("ec-role")||"Operator";var rate=parseFloat(gv("ec-rate"))||35;var dayRate=parseFloat(gv("ec-day-rate"))||0;var payFreq=gv("ec-pay-freq")||"fortnightly";var superFund=gvt("ec-super-fund");var superMember=gvt("ec-super-member");crew=crew.map(function(x){return x.id===id?Object.assign({},x,{name:name,role:role,rate:rate,dayRate:dayRate,payFrequency:payFreq,superFund:superFund,superMember:superMember}):x;});saveAll();closeModal();toast("Crew member updated");render();}
function buildInvoice(){var client=document.getElementById("if-client").value.trim();if(!client){toast("Please enter a client name","error");return;}if(!selectedSess.length){toast("Select at least one session","error");return;}var items=sessions.filter(function(s){return selectedSess.includes(s.id);});var subtotal=Math.round(items.reduce(function(a,s){return a+s.total;},0)*100)/100;var addr=document.getElementById("if-addr").value.trim();/* FIX: ATO requires Bill To address for tax invoices over $1000 */if(subtotal*1.1>1000&&!addr){if(!confirm("Tax invoices over $1000 should include the buyer\u2019s address. Continue without one?"))return;}var gstRegistered=settings.gstRegistered!==false;var gst=gstRegistered?Math.round(subtotal*.1*100)/100:0;var totalGST=Math.round((subtotal+gst)*100)/100;var invNo=fmtInvNo(settings.nextInvoice);var dueInput=document.getElementById("if-due").value;var dueDate=dueInput?new Date(dueInput+"T00:00:00").toISOString():new Date(Date.now()+14*86400000).toISOString();var inv={id:uid(),invoiceNo:invNo,date:new Date().toISOString(),dueDate:dueDate,client:client,clientAddress:addr,notes:document.getElementById("if-notes").value,items:items,subtotal:subtotal,gst:gst,totalGST:totalGST,status:"Draft"};invoices.unshift(inv);settings.nextInvoice++;sessions=sessions.map(function(s){return selectedSess.includes(s.id)?Object.assign({},s,{invoiced:true,invoiceNo:invNo}):s;});selectedSess=[];saveAll();closeModal();switchTab("invoices");toast("Invoice "+invNo+" created");render();}
function getInvoicePaid(inv){if(!inv||!inv.payments)return 0;return Math.round(inv.payments.reduce(function(a,p){return a+(parseFloat(p.amount)||0);},0)*100)/100;}
function getInvoiceBalance(inv){if(!inv)return 0;var paid=getInvoicePaid(inv);return Math.round(((inv.totalGST||0)-paid)*100)/100;}
function autoUpdatePaymentStatus(inv){if(!inv||inv.statusLocked)return;var paid=getInvoicePaid(inv);var total=inv.totalGST||0;if(paid<=0)return;if(paid>=total-0.01){inv.status="Paid";inv.paidDate=inv.paidDate||new Date().toISOString();}else{inv.status="Part Paid";}}
function setInvoiceStatus(id,status){invoices=invoices.map(function(i){return i.id===id?Object.assign({},i,{status:status,paidDate:status==="Paid"?new Date().toISOString():i.paidDate}):i;});saveAll();render();}
function renderPaymentsSection(inv){if(!inv.payments||!inv.payments.length)return'';var rows=inv.payments.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).map(function(p){return'<div style="display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;border-bottom:1px solid #282828"><div style="flex:1"><div style="font-size:12px;color:#F0EDE8;font-weight:700">'+fmtCur(p.amount)+' \u00b7 '+esc(p.method||"Payment")+'</div><div style="font-size:11px;color:#6E6B64;margin-top:2px">'+fmtDate(p.date)+(p.reference?' \u00b7 Ref: '+esc(p.reference):"")+'</div>'+(p.notes?'<div style="font-size:11px;color:#6E6B64;margin-top:2px;font-style:italic">'+esc(p.notes)+'</div>':'')+'</div><button onclick="deletePayment(\''+inv.id+'\',\''+p.id+'\')" style="background:none;border:none;color:#D93B3B;cursor:pointer;font-size:11px;padding:0 0 0 10px">delete</button></div>';}).join("");return'<div style="background:#1C1C1C;border-radius:10px;overflow:hidden;margin-bottom:14px"><div style="background:#0D0D0D;padding:10px 14px;font-size:11px;color:#22A05A;font-weight:700;letter-spacing:1px;text-transform:uppercase">Payments Received</div>'+rows+'</div>';}
function openRecordPaymentModal(invId){var inv=invoices.find(function(i){return i.id===invId;});if(!inv)return;window._payInvId=invId;var balance=getInvoiceBalance(inv);var today=fmtIsoDate(new Date());var overlay=document.getElementById("overlay");overlay.classList.add("open");document.getElementById("modal-title").textContent="Record Payment";document.getElementById("modal-body").innerHTML='<div style="background:#0D0D0D;border-radius:10px;padding:12px;margin-bottom:14px"><div style="font-size:11px;color:#6E6B64;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Invoice</div><div style="font-size:14px;font-weight:700;color:#F0EDE8">'+esc(inv.invoiceNo)+' \u00b7 '+esc(inv.client)+'</div><div style="font-size:12px;color:#22A05A;margin-top:4px">Balance owing: '+fmtCur(balance)+'</div></div><div class="field"><label>Amount Received *</label><input id="pay-amt" type="number" min="0.01" step="0.01" max="'+balance+'" value="'+balance.toFixed(2)+'" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/><div style="font-size:11px;color:#6E6B64;margin-top:4px">Max: '+fmtCur(balance)+'</div></div><div class="field"><label>Date *</label><input id="pay-date" type="date" value="'+today+'" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div class="field"><label>Payment Method</label><select id="pay-method" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"><option>Bank Transfer</option><option>Cash</option><option>Card</option><option>Cheque</option><option>Other</option></select></div><div class="field"><label>Reference (optional)</label><input id="pay-ref" placeholder="e.g. Direct deposit ref, receipt no" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div class="field"><label>Notes (optional)</label><textarea id="pay-notes" placeholder="Any notes" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%;min-height:50px"></textarea></div><div style="display:flex;gap:10px"><button class="btn btn-success" style="flex:1" onclick="saveRecordPayment()">Save Payment</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>';}
function saveRecordPayment(){var invId=window._payInvId;var inv=invoices.find(function(i){return i.id===invId;});if(!inv)return;var amt=parseFloat(gv("pay-amt"));var date=gv("pay-date");var method=gv("pay-method")||"Bank Transfer";var ref=gvt("pay-ref");var notes=gvt("pay-notes");if(!amt||amt<=0){toast("Please enter an amount","error");return;}if(!date){toast("Please enter a date","error");return;}var balance=getInvoiceBalance(inv);if(amt>balance+0.01){if(!confirm("Amount ($"+amt.toFixed(2)+") is more than the balance owing ($"+balance.toFixed(2)+"). Save anyway?"))return;}if(!inv.payments)inv.payments=[];inv.payments.push({id:uid(),amount:Math.round(amt*100)/100,date:new Date(date+"T00:00:00").toISOString(),method:method,reference:ref,notes:notes,recordedAt:new Date().toISOString()});inv.statusLocked=false;autoUpdatePaymentStatus(inv);saveAll();closeModal();openModal("viewInv",invId);toast("Payment of "+fmtCur(amt)+" recorded");}
function deletePayment(invId,payId){var inv=invoices.find(function(i){return i.id===invId;});if(!inv||!inv.payments)return;var p=inv.payments.find(function(x){return x.id===payId;});if(!p||!confirm("Delete payment of "+fmtCur(p.amount)+"?"))return;inv.payments=inv.payments.filter(function(x){return x.id!==payId;});if(getInvoicePaid(inv)<=0&&inv.status==="Part Paid")inv.status="Sent";inv.statusLocked=false;autoUpdatePaymentStatus(inv);saveAll();openModal("viewInv",invId);toast("Payment deleted");}
function deleteInvoice(id){if(!confirm("Delete this invoice?"))return;var inv=invoices.find(function(i){return i.id===id;});invoices=invoices.filter(function(i){return i.id!==id;});if(inv)sessions=sessions.map(function(s){return s.invoiceNo===inv.invoiceNo?Object.assign({},s,{invoiced:false,invoiceNo:undefined}):s;});deletePhotosForParent("invoice",id);saveAll();render();toast("Invoice deleted");}

bilisation")+'</div><div style="display:flex;gap:8px"><div class="field" style="flex:1"><label>Qty</label><input class="ci-qty" type="number" value="1" min="0" step="0.01" style="background:#141414;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div class="field" style="flex:1"><label>Unit</label><select class="ci-unit" style="background:#141414;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"><option>item</option><option>hr</option><option>day</option><option>m3</option><option>t</option><option>load</option><option>L</option><option>job</option><option>ea</option></select></div><div class="field" style="flex:1"><label>Rate ($)</label><input class="ci-rate" type="number" min="0" step="0.01" placeholder="0.00" style="background:#141414;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div></div></div></div>'+'<button class="btn btn-ghost btn-sm" style="width:100%;margin-bottom:12px" onclick="addCustomInvoiceLine()">+ Add Line Item</button>'+divider("Notes")+'<div class="field"><label>Notes / Reference</label><textarea id="ci-notes" placeholder="e.g. Diesel cost recovery \u2014 Goolwa run 28/05/2026" '+' style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%;font-family:inherit;font-size:14px;resize:vertical;min-height:60px"'+'>Thank you for your business.</textarea></div>'+'<div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-success" style="flex:1;padding:13px" onclick="saveCustomInvoice()">Generate Invoice</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>';}
function addCustomInvoiceLine(){var container=document.getElementById("ci-lines");if(!container)return;var seed=uid();var descId="ci-desc-"+seed;var row=document.createElement("div");row.className="ci-line-row";row.style.cssText="background:#0D0D0D;border-radius:10px;padding:12px;margin-bottom:8px;position:relative";row.innerHTML='<button onclick="this.parentNode.remove()" style="position:absolute;top:8px;right:8px;background:none;border:none;color:#D93B3B;cursor:pointer;font-size:14px;z-index:5">x</button><div class="field"><label>Description</label>'+smartInput(descId,"invoiceItems","e.g. Tip fees, Auger hire, Diesel")+'</div><div style="display:flex;gap:8px"><div class="field" style="flex:1"><label>Qty</label><input class="ci-qty" type="number" value="1" min="0" step="0.01" style="background:#141414;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div class="field" style="flex:1"><label>Unit</label><select class="ci-unit" style="background:#141414;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"><option>item</option><option>hr</option><option>day</option><option>m3</option><option>t</option><option>load</option><option>L</option><option>job</option><option>ea</option></select></div><div class="field" style="flex:1"><label>Rate ($)</label><input class="ci-rate" type="number" min="0" step="0.01" placeholder="0.00" style="background:#141414;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div></div>';container.appendChild(row);}
function saveCustomInvoice(){var client=gvt("ci-client");if(!client){toast("Please enter a client name","error");return;}var addr=gvt("ci-addr");var date=gv("ci-date")||fmtIsoDate(new Date());var due=gv("ci-due")||fmtIsoDate(new Date(Date.now()+14*86400000));var notes=gvt("ci-notes");var items=[];document.querySelectorAll(".ci-line-row").forEach(function(row){var descInput=row.querySelector(".smart-wrap input");var desc=descInput?descInput.value.trim():"";var qty=parseFloat(row.querySelector(".ci-qty").value)||1;var unit=row.querySelector(".ci-unit").value||"item";var rate=parseFloat(row.querySelector(".ci-rate").value)||0;if(desc&&rate>0){items.push({id:uid(),isCustom:true,desc:desc,qty:qty,unit:unit,rate:rate,total:Math.round(qty*rate*100)/100});addHistory("invoiceItems",desc);}});if(!items.length){toast("Please add at least one line item with a rate","error");return;}var subtotal=Math.round(items.reduce(function(a,i){return a+i.total;},0)*100)/100;var gstRegistered=settings.gstRegistered!==false;var roughTotal=gstRegistered?subtotal*1.1:subtotal;if(roughTotal>1000&&!addr){if(!confirm("Tax invoices over $1000 should include the buyer\u2019s address. Continue without one?"))return;}var gst=gstRegistered?Math.round(subtotal*0.1*100)/100:0;var totalGST=Math.round((subtotal+gst)*100)/100;var invNo=fmtInvNo(settings.nextInvoice||1);addHistory("clients",client);var inv={id:uid(),invoiceNo:invNo,date:new Date(date+"T09:00:00").toISOString(),dueDate:new Date(due+"T00:00:00").toISOString(),client:client,clientAddress:addr,notes:notes,items:items,subtotal:subtotal,gst:gst,totalGST:totalGST,status:"Draft"};invoices.unshift(inv);settings.nextInvoice=(settings.nextInvoice||1)+1;saveAll();closeModal();switchTab("invoices");toast("Invoice "+invNo+" created");render();}

function fmtPayRunNo(n){return"PR-"+String(n).padStart(4,"0");}
function addBusinessDays(date,n){var d=new Date(date);var added=0;while(added<n){d.setDate(d.getDate()+1);var day=d.getDay();if(day!==0&&day!==6)added++;}return d;}
function estimatePAYG(grossPerPay,frequency){if(!grossPerPay||grossPerPay<=0)return 0;var paysPerYear=frequency==="weekly"?52:frequency==="monthly"?12:26;var annual=grossPerPay*paysPerYear;var tax=0;if(annual<=18200)tax=0;else if(annual<=45000)tax=(annual-18200)*0.16;else if(annual<=135000)tax=4288+(annual-45000)*0.30;else if(annual<=190000)tax=31288+(annual-135000)*0.37;else tax=51638+(annual-190000)*0.45;var medicare=annual>29207?annual*0.02:0;return Math.round(((tax+medicare)/paysPerYear)*100)/100;}
function getCrewSessionsInPeriod(crewName,startDate,endDate){var startT=new Date(startDate+"T00:00:00").getTime();var endT=new Date(endDate+"T23:59:59").getTime();return sessions.filter(function(s){if(s.operator!==crewName)return false;var t=new Date(s.startTime).getTime();return t>=startT&&t<=endT;});}
function calcCrewPay(crewMember,sessionsList,settingsRef){var totalHours=sessionsList.reduce(function(a,s){return a+(s.duration||0);},0);var hours=Math.round(totalHours*100)/100;var hourlyRate=crewMember.rate||35;var dayRate=crewMember.dayRate||0;var gross=Math.round(hours*hourlyRate*100)/100;var freq=crewMember.payFrequency||settingsRef.defaultPayFrequency||"fortnightly";var tax=estimatePAYG(gross,freq);var superRate=settingsRef.superRate||0.12;var superAmt=Math.round(gross*superRate*100)/100;var net=Math.round((gross-tax)*100)/100;return{hours:hours,hourlyRate:hourlyRate,dayRate:dayRate,dayShifts:0,gross:gross,tax:tax,super:superAmt,net:net,sessionIds:sessionsList.map(function(s){return s.id;})};}
function renderPay(){var alerts=getUpcomingSuperAlerts();var alertHtml=alerts.length?'<div class="card" style="border-color:#D93B3B40;background:#D93B3B10;margin-bottom:14px"><div style="font-size:11px;color:#D93B3B;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px">⚠ Super Deadlines</div>'+alerts.map(function(a){return'<div style="font-size:13px;color:#F0EDE8;padding:6px 0;border-bottom:1px solid #282828">'+esc(a.runNo)+' · '+fmtCur(a.totalSuper)+' · '+(a.daysOverdue>0?'<span style="color:#D93B3B;font-weight:700">'+a.daysOverdue+' days OVERDUE</span>':'<span style="color:#F5C518;font-weight:700">Due in '+a.daysUntilDue+' business days</span>')+'</div>';}).join("")+'</div>':"";var rows=payRuns.slice().sort(function(a,b){return new Date(b.payDate)-new Date(a.payDate);}).map(function(pr){var statusCol=pr.status==="Paid"?"#22A05A":pr.status==="Approved"?"#2878CC":"#6E6B64";var superStatusCol=pr.superStatus==="Paid"?"#22A05A":(pr.superDueDate&&new Date(pr.superDueDate)<new Date()?"#D93B3B":"#F5C518");var superLabel=pr.superStatus==="Paid"?"Super Paid":(pr.superDueDate&&new Date(pr.superDueDate)<new Date()?"Super OVERDUE":"Super Owed");return'<div class="card card-click" onclick="openModal(\'viewPayRun\',\''+pr.id+'\')"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px"><div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span style="font-size:15px;font-weight:800;color:#F0EDE8">'+esc(pr.runNo)+'</span>'+badge(pr.status,statusCol)+badge(superLabel,superStatusCol,true)+'</div><div style="font-size:13px;color:#C8C4BE;margin-top:4px">'+fmtDate(pr.periodStart)+' to '+fmtDate(pr.periodEnd)+'</div><div style="font-size:11px;color:#6E6B64;margin-top:2px">Pay date '+fmtDate(pr.payDate)+' · Super due '+fmtDate(pr.superDueDate)+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:16px;font-weight:800;color:#22A05A">'+fmtCur(pr.totalGross)+'</div><div style="font-size:1 function getUpcomingSuperAlerts(){var now=Date.now();var threeBizDays=addBusinessDays(new Date(),3).getTime();var alerts=[];payRuns.forEach(function(pr){if(pr.superStatus==="Paid")return;if(!pr.superDueDate)return;var dueT=new Date(pr.superDueDate).getTime();var msPerDay=86400000;if(dueT<now){alerts.push({runNo:pr.runNo,totalSuper:pr.totalSuper,daysOverdue:Math.floor((now-dueT)/msPerDay),daysUntilDue:0});}else if(dueT<=threeBizDays){alerts.push({runNo:pr.runNo,totalSuper:pr.totalSuper,daysOverdue:0,daysUntilDue:Math.ceil((dueT-now)/msPerDay)});}});return alerts.sort(function(a,b){return b.daysOverdue-a.daysOverdue;});}
function openNewPayRunModal(){var overlay=document.getElementById("overlay");overlay.classList.add("open");document.getElementById("modal-title").textContent="New Pay Run";var today=new Date();var twoWeeksAgo=new Date(today.getTime()-14*86400000);var defaultEnd=new Date(today.getTime()-86400000);var defaultStart=new Date(defaultEnd.getTime()-13*86400000);document.getElementById("modal-body").innerHTML='<div class="field"><label>Period Start *</label><input id="pr-start" type="date" value="'+fmtIsoDate(defaultStart)+'" onchange="prRecalcEntries()" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div class="field"><label>Period End *</label><input id="pr-end" type="date" value="'+fmtIsoDate(defaultEnd)+'" onchange="prRecalcEntries()" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div class="field"><label>Pay Date *</label><input id="pr-paydate" type="date" value="'+fmtIsoDate(today)+'" onchange="prUpdateSuperDue()" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/><div style="font-size:11px;color:#6E6B64;margin-top:4px" id="pr-super-due"></div></div>'+divider("Crew & Pay")+'<div style="font-size:11px;color:#6E6B64;margin-bottom:10px">Auto-pulled from sessions in the period. You can edit any field.</div><div id="pr-entries"></div><button class="btn btn-ghost btn-sm" style="width:100%;margin:8px 0 14px" onclick="prAddCustomEntry()">+ Add Crew Manually</button><div class="totals-preview" id="pr-totals"></div><div style="display:flex;gap:10px"><button class="btn btn-primary" style="flex:1" onclick="savePayRun()">Save Pay Run</button><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>';prRecalcEntries();prUpdateSuperDue();}
function prUpdateSuperDue(){var payDate=gv("pr-paydate");if(!payDate)return;var due=addBusinessDays(new Date(payDate+"T00:00:00"),7);var el=document.getElementById("pr-super-due");if(el)el.textContent="Super due by "+fmtDate(due)+" (7 business days)";}
function prRecalcEntries(){var startDate=gv("pr-start");var endDate=gv("pr-end");if(!startDate||!endDate)return;var entries=[];crew.forEach(function(m){var crewSessions=getCrewSessionsInPeriod(m.name,startDate,endDate);if(crewSessions.length===0)return;var pay=calcCrewPay(m,crewSessions,settings);entries.push({id:uid(),crewId:m.id,crewName:m.name,hours:pay.hours,hourlyRate:pay.hourlyRate,gross:pay.gross,tax:pay.tax,super:pay.super,net:pay.net,sessionIds:pay.sessionIds,custom:false});});window._payRunEntries=entries;prRenderEntries();}
function prRenderEntries(){var container=document.getElementById("pr-entries");if(!container)return;var entries=window._payRunEntries||[];if(entries.length===0){container.innerHTML='<div style="padding:14px;background:#0D0D0D;border-radius:8px;color:#6E6B64;font-size:12px;text-align:center">No crew sessions in this period. Use "+ Add Crew Manually" to add a pay entry.</div>';prUpdateTotals();return;}container.innerHTML=entries.map(function(e,i){return'<div style="background:#0D0D0D;border:1px solid #282828;border-radius:10px;padding:12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:#F0EDE8">'+esc(e.crewName)+(e.custom?' <span style="font-size:10px;color:#F5C518">(manual)</span>':' <span style="font-size:10px;color:#6E6B64">('+e.sessionIds.length+' sessions)</span>')+'</div><button onclick="prRemoveEntry('+i+')" style="background:none;border:none;color:#D93B3B;cursor:pointer;font-size:11px">remove</button></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11px"><div><label style="font-size:9px;color:#6E6B64;text-transform:uppercase;letter-spacing:1px">Hours</label><input type="number" min="0" step="0.25" value="'+e.hours+'" onchange="prUpdateEntry('+i+',\'hours\',this.value)" style="background:#1C1C1C;border:1px solid #282828;border-radius:6px;color:#F0EDE8;padding:6px 8px;width:100%;font-family:inherit"/></div><div><label style="font-size:9px;color:#6E6B64;text-transform:uppercase;letter-spacing:1px">Rate $/hr</label><input type="number" min="0" step="0.01" value="'+e.hourlyRate+'" onchange="prUpdateEntry('+i+',\'hourlyRate\',this.value)" style="background:#1C1C1C;border:1px solid #282828;border-radius:6px;color:#F0EDE8;padding:6px 8px;width:100%;font-family:inherit"/></div><div><label style="font-size:9px;color:#22A05A;text-transform:uppercase;letter-spacing:1px">Gross</label><input type="number" min="0" step="0.01" value="'+e.gross+'" onchange="prUpdateEntry('+i+',\'gross\',this.value)" style="background:#1C1C1C;border:1px solid #22A05A40;border-radius:6px;color:#22A05A;padding:6px 8px;width:100%;font-family:inherit;font-weight:700"/></div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11px;margin-top:6px"><div><label style="font-size:9px;color:#D93B3B;text-transform:uppercase;letter-spacing:1px">Tax (est)</label><input type="number" min="0" step="0.01" value="'+e.tax+'" onchange="prUpdateEntry('+i+',\'tax\',this.value)" style="background:#1C1C1C;border:1px solid #282828;border-radius:6px;color:#D93B3B;padding:6px 8px;width:100%;font-family:inherit"/></div><div><label style="font-size:9px;color:#F5C518;text-transform:uppercase;letter-spacing:1px">Super</label><input type="number" min="0" step="0.01" value="'+e.super+'" onchange="prUpdateEntry('+i+',\'super\',this.value)" style="background:#1C1C1C;border:1px solid #F5C51840;border-radius:6px;color:#F5C518;padding:6px 8px;width:100%;font-family:inherit;font-weight:700"/></div><div><label style="font-size:9px;color:#2878CC;text-transform:uppercase;letter-spacing:1px">Net</label><input type="number" readonly value="'+e.net+'" style="background:#0D0D0D;border:1px solid #282828;border-radius:6px;color:#2878CC;padding:6px 8px;width:100%;font-family:inherit;font-weight:700"/></div></div></div>';}).join("");prUpdateTotals();}
function prUpdateEntry(i,field,val){var entries=window._payRunEntries||[];if(!entries[i])return;var v=parseFloat(val)||0;entries[i][field]=v;if(field==="hours"||field==="hourlyRate"){entries[i].gross=Math.round(entries[i].hours*entries[i].hourlyRate*100)/100;var crewMember=crew.find(function(c){return c.id===entries[i].crewId;});var freq=(crewMember&&crewMember.payFrequency)||settings.defaultPayFrequency||"fortnightly";entries[i].tax=estimatePAYG(entries[i].gross,freq);entries[i].super=Math.round(entries[i].gross*(settings.superRate||0.12)*100)/100;}if(field==="gross"){var crewMember2=crew.find(function(c){return c.id===entries[i].crewId;});var freq2=(crewMember2&&crewMember2.payFrequency)||settings.defaultPayFrequency||"fortnightly";entries[i].tax=estimatePAYG(entries[i].gross,freq2);entries[i].super=Math.round(entries[i].gross*(settings.superRate||0.12)*100)/100;}entries[i].net=Math.round((entries[i].gross-entries[i].tax)*100)/100;prRenderEntries();}

function crewBuildClock(){var myE=sessions.filter(function(s){return s.operator===crewWHO.name;});var wkAgo=Date.now()-7*86400000;var todStr=new Date().toDateString();var totHrs=0,wkHrs=0,todHrs=0;myE.forEach(function(e){var dur=e.duration||0;totHrs+=dur;if(new Date(e.startTime).getTime()>=wkAgo)wkHrs+=dur;if(new Date(e.startTime).toDateString()===todStr)todHrs+=dur;});var isOn=crewClocked&&crewClocked.memberId===crewWHO.id;var html='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;margin-top:4px"><div class="crew-stat"><div class="crew-stat-label">Today</div><div class="crew-stat-value" style="color:#22A05A">'+fmtHrs(todHrs)+'</div></div><div class="crew-stat"><div class="crew-stat-label">This Week</div><div class="crew-stat-value" style="color:#F5C518">'+fmtHrs(wkHrs)+'</div></div><div class="crew-stat"><div class="crew-stat-label">All Time</div><div class="crew-stat-value" style="color:#E8580A">'+fmtHrs(totHrs)+'</div></div></div><div class="card" style="text-align:center;padding:24px 18px">';if(isOn){html+='<div style="font-size:13px;color:#22A05A;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">On the Clock</div><div id="crew-big-timer" style="font-size:36px;font-weight:800;color:#22A05A;font-variant-numeric:tabular-nums;margin-bottom:4px">00:00:00</div><div style="font-size:12px;color:#6E6B64;margin-bottom:16px">Started '+fmtTime(crewClocked.start)+'</div><div style="font-size:13px;color:#C8C4BE;margin-bottom:16px">'+esc(crewClocked.machine||"")+(crewClocked.client?" - "+esc(crewClocked.client):"")+'</div><button class="btn btn-danger" style="width:100%;padding:14px;font-size:15px" onclick="showClockOff()">Clock Off</button>';}else{html+='<div style="font-size:13px;color:#6E6B64;margin-bottom:20px">You are not clocked in</div><button class="btn btn-success" style="width:100%;padding:16px;font-size:16px;border-radius:12px" onclick="showCrewClockIn()">Clock In</button>';}html+='</div>';if(myE.length>0){html+='<div function crewBuildHistory(){var myE=sessions.filter(function(s){return s.operator===crewWHO.name;});myE.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});if(!myE.length)return'<div class="card"><div class="empty"><div class="empty-icon">H</div><div>No entries yet.</div></div></div>';var totAll=0;myE.forEach(function(e){totAll+=e.duration||0;});var html='<div class="card" style="border-color:#1A6B3C40;margin-bottom:4px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:11px;color:#6E6B64;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Total All Time</div><div style="font-size:20px;font-weight:800;color:#22A05A">'+fmtHrs(totAll)+'</div></div><button class="btn btn-success btn-sm" onclick="crewDoShareAll()">Share All Hours</button></div></div>';var wks={};myE.forEach(function(e){var d=new Date(e.startTime);var mon=new Date(d);mon.setDate(d.getDate()-(d.getDay()||7)+1);var key=mon.toDateString();if(!wks[key])wks[key]={label:"Week of "+mon.toLocaleDateString("en-AU",{day:"2-digit",month:"short"}),list:[],tot:0};wks[key].list.push(e);wks[key].tot+=e.duration||0;});Object.values(wks).forEach(function(wk){html+='<div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px"><div style="font-size:11px;color:#6E6B64;font-weight:700;letter-spacing:1px;text-transform:uppercase">'+wk.label+'</div><div style="font-size:13px;font-weight:800;color:#22A05A">'+fmtHrs(wk.tot)+'</div></div>';wk.list.forEach(function(e){html+='<div class="card" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px"><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#F0EDE8">'+esc(e.machine||"")+'</div>'+(e.client?'<div style="font-size:12px;color:#C8C4BE;margin-top:2px">'+esc(e.client)+(e.site?" - "+esc(e.site):"")+'</div>':'')+'<div style="font-size:11px;color:#6E6B64;margin-top:3px">'+fmtDate(e.startTime)+" - "+fmtTime(e.startTime)+" to "+fmtTime(e.endTime)+'</div></div><div style="font-size:15px;font-weight:800;color:#22A05A">'+fmtHrs(e.duration)+'</div></div></div>';});});return html;}
function crewBuildManual(){var today=new Date().toISOString().split("T")[0];var attOpts=ATTACHMENTS.map(function(a){return"<option>"+a+"</option>";}).join("");var machOpts=MACHINES.map(function(m){return"<option>"+m+"</option>";}).join("");var lbBtns=[0,15,20,30,45,60].map(function(m){return'<button class="lb'+(m===0?" on":"")+'" id="cme-lb'+m+'" onclick="cmeSelLunch('+m+')">'+(m===0?"No Break":m+"min")+"</button>";}).join("");return'<div class="card"><div style="font-size:13px;font-weight:800;color:#F0EDE8;margin-bottom:14px">Log Manual Entry</div><div class="field"><label>Client</label>'+smartInput("cme-client","clients","e.g. South Coast Sand & Civil")+'</div><div class="field"><label>Site</label>'+smartInput("cme-site","sites","e.g. Goolwa North Stage 1")+'</div><div class="field"><label>Date *</label><input id="cme-date" type="date" value="'+today+'" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div style="display:flex;gap:10px"><div class="field" style="flex:1"><label>Start *</label><input id="cme-start" type="time" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div><div class="field" style="flex:1"><label>End *</label><input id="cme-end" type="time" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%"/></div></div><div class="field"><label>Machine</label><select id="cme-machine" onchange="cmeMachChange()" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%">'+machOpts+'</select></div><div class="field" id="cme-att-wrap"><label>Attachment</label><select id="cme-attach" style="background:#0D0D0D;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:100%">'+attOpts+'</select></div><div style="margin-bottom:12px"><div class="field-label" style="margin-bottom:8px">Lunch Break</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'+lbBtns+'</div><input type="hidden" id="cme-lunch-val" value="0"/></div><div class="field"><label>Notes</label>'+smartInput("cme-notes","notes","Any notes")+'</div><div style="background:#0D0D0D;border-radius:10px;padding:14px;margin-bottom:12px"><div style="font-size:11px;color:#E8580A;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Engine Hours *</div><div style="display:flex;gap:10px;align-items:center"><input type="number" min="0" step="1" placeholder="e.g. 1250" id="cme-eng-hours" style="background:#1C1C1C;border:1px solid #282828;border-radius:8px;color:#F0EDE8;padding:10px 12px;width:120px;font-family:inherit;font-size:14px"/><span style="font-size:12px;color:#6E6B64">Current meter reading</span></div></div><button class="btn btn-success" style="width:100%;padding:13px;font-size:15px" onclick="doCrewSaveManual()">Save Entry</button></div>';}
var CME_LUNCH=0;
function cmeSelLunch(m){CME_LUNCH=m;var lv=document.getElementById("cme-lunch-val");if(lv)lv.value=m;[0,15,20,30,45,60].forEach(function(x){var b=document.getElementById("cme-lb"+x);if(b)b.className="lb"+(x===m?" on":"");});}
function cmeMachChange(){var m=document.getElementById("cme-machine");var f=document.getElementById("cme-att-wrap");if(m&&f)f.style.display=(m.value==="Hino 700")?"none":"block";}
/* FIX: Engine hours validation here too */
function doCrewSaveManual(){var client=gv("cme-client")||"";var site=gv("cme-site")||"";var date=gv("cme-date")||"";var startT=gv("cme-start")||"";var endT=gv("cme-end")||"";if(!date||!startT||!endT){toast("Please enter date, start and end time","error");return;}var engHoursStr=gv("cme-eng-hours");var engHoursNum=parseFloat(engHoursStr);if(!engHoursStr||isNaN(engHoursNum)||engHoursNum<0){toast("Please enter valid engine hours","error");return;}var sISO=localISO(date,startT);var eISO=localISO(date,endT);if(new Date(eISO)<=new Date(sISO)){toast("End must be after start","error");return;}var raw=(new Date(eISO)-new Date(sISO))/3600000;var lunch=parseInt(gv("cme-lunch-val"))||0;var dur=Math.max(0,raw-(lunch/60));var machine=gv("cme-machine")||"Hitachi ZX55U";var attach=machine!=="Hino 700"?(gv("cme-attach")||"General Bucket"):"";var notes=gv("cme-notes")||"";addHistory("clients",client.trim());addHistory("sites",site.trim());addHistory("notes",notes.trim());var mhd=getMachineHours();mhd.unshift({id:uid(),machine:machine,type:"Hours Logged",date:date,hours:engHoursNum,notes:"Manual entry",loggedBy:crewWHO?crewWHO.name:"",timestamp:new Date().toISOString()});saveMachineHours(mhd);sessions.unshift({id:uid(),client:client.trim(),site:site.trim(),machine:machine,attachment:attach,hireType:"Wet Hire",operator:crewWHO.name,notes:notes.trim(),rate:0,startTime:sISO,endTime:eISO,duration:dur,rawDuration:raw,lunchBreak:lunch,total:0,status:"complete",invoiced:false,fromCrew:true,engineHours:engHoursNum});sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});save("ae_sessions",sessions);crewNav(1);toast("Entry saved - "+fmtHrs(dur));}
function crewDoShareAll(){var myE=sessions.filter(function(s){return s.operator===crewWHO.name;});if(!myE.length){toast("No entries to share","error");return;}var tot=0;myE.forEach(function(e){tot+=e.duration||0;});var lines=["ANGEL EARTHWORKS & CIVIL","Timesheet - "+crewWHO.name,new Date().toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"}),"--------------------",""];myE.forEach(function(e,i){lines.push((i+1)+". "+fmtDate(e.startTime)+" "+fmtTime(e.startTime)+" to "+fmtTime(e.endTime));lines.push("   "+(e.machine||"")+(e.client?" | "+e.client:""));lines.push("   Hours: "+fmtHrs(e.duration)+(e.lunchBreak>0?" (excl. "+e.lunchBreak+"min lunch)":""));if(e.engineHours)lines.push("   Engine: "+e.engineHours+"hrs");lines.push("");});lines.push("--------------------","TOTAL: "+fmtHrs(tot));var text=lines.join("\n");if(navigator.share){navigator.share({title:"Timesheet - "+crewWHO.name,text:text}).catch(function(){});}else if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){toast("Copied to clipboard");});}}

function getMachineHours(){return load("ae_mhours",[]);}
function saveMachineHours(data){save("ae_mhours",data);}

/* INIT: show PIN screen, sync from Firebase, auto-update statuses */
document.getElementById("pin-screen").style.display="flex";
document.getElementById("boss-view").style.display="none";
document.getElementById("crew-view").style.display="none";
drawDots();
if(forceInitialPinSetup()){document.getElementById("pin-msg").textContent="Reload the app and set a manager PIN to continue";}

ensureFirebaseAuth(function(){
syncFromFirebase(function(){
sessions=load("ae_sessions",[]);
sessions.sort(function(a,b){return new Date(b.startTime)-new Date(a.startTime);});
crew=load("ae_crew",[]);
invoices=load("ae_invoices",[]);
quotes=load("ae_quotes",[]);
payRuns=load("ae_payruns",[]);
compliance=load("ae_compliance",[]);
crewMembers=load("ae_pins",[{id:"w1",name:"Crew Member",pin:"1234",role:"Operator"}]);
var savedSettings=load("ae_settings",{});
settings=Object.assign({},DS,savedSettings);
if(!settings.rates)settings.rates=Object.assign({},DR);
if(!settings.managerPin)settings.managerPin=load("ae_mgr","0000");
activeSession=load("ae_active",null);
autoUpdateStatuses();
});
});
